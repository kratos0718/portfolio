<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&amp;family=Space+Mono&amp;display=swap');
    </style>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0A1520"/>
      <stop offset="100%" stop-color="#0F1E2E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bg)"/>

  <!-- Single large faint circle — right side only -->
  <circle cx="1420" cy="198" r="230" fill="none" stroke="#B8A07A" stroke-width="1" opacity="0.08"/>
  <circle cx="1420" cy="198" r="140" fill="none" stroke="#B8A07A" stroke-width="1" opacity="0.06"/>

  <!-- ── Content starts at x=290 (clear of profile pic) ── -->

  <!-- Role label -->
  <text
    x="292" y="138"
    font-family="'Space Mono','Courier New',monospace"
    font-size="10"
    fill="#B8A07A"
    letter-spacing="4"
    opacity="0.9">AI ENGINEER  ·  LLM &amp; RAG  ·  FULL STACK</text>

  <!-- Thin gold rule under label -->
  <line x1="292" y1="150" x2="760" y2="150" stroke="#B8A07A" stroke-width="0.8" opacity="0.3"/>

  <!-- Name -->
  <text
    x="287" y="243"
    font-family="'Cormorant Garamond','Georgia','Times New Roman',serif"
    font-weight="600"
    font-size="96"
    fill="#EDE8E0"
    letter-spacing="1">Abhinav Tarigoppula</text>

  <!-- Tagline -->
  <text
    x="292" y="280"
    font-family="'Cormorant Garamond','Georgia',serif"
    font-size="20"
    font-style="italic"
    fill="#5A6A62"
    letter-spacing="1">Learning fast. Building smarter. Shipping real.</text>

  <!-- Thin rule above footer -->
  <line x1="292" y1="312" x2="860" y2="312" stroke="#B8A07A" stroke-width="0.6" opacity="0.2"/>

  <!-- Website + credentials -->
  <text
    x="292" y="336"
    font-family="'Space Mono','Courier New',monospace"
    font-size="10"
    fill="#B8A07A"
    letter-spacing="2"
    opacity="0.75">abhinavbuilds.online</text>

  <text
    x="468" y="336"
    font-family="'Space Mono',monospace"
    font-size="10"
    fill="#3A4A42"
    letter-spacing="1.5">·  OneStop AI  ·  PwC Launchpad  ·  250+ LeetCode</text>

  <!-- Open to work — subtle green dot + text only, no box -->
  <circle cx="293" cy="358" r="3.5" fill="#4ade80" opacity="0.85"/>
  <text
    x="303" y="362"
    font-family="'Space Mono',monospace"
    font-size="9.5"
    fill="#4A6A52"
    letter-spacing="2.5">OPEN TO WORK</text>

</svg>
